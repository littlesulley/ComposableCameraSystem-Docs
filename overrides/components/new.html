{% if new_tag_class %}
<span class="flex size-2 rounded-full {{ new_tag_class }}" title="New"></span>
{% elif new_tag_color %}
<span class="flex size-2 rounded-full" title="New" style="background-color: {{ new_tag_color }};"></span>
{% elif config.theme.accent %}
<span class="flex size-2 rounded-full bg-(--theme-accent)" title="New"></span>
{% else %}
<span class="flex size-2 rounded-full bg-blue-500" title="New"></span>
{% endif %}
