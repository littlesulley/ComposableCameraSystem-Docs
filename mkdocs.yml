site_name: ComposableCameraSystem
site_url: https://composable-camera-system.readthedocs.io/en/latest/
site_description: A composable, data-driven camera framework for Unreal Engine 5.6
site_author: Sulley (littlesulley)
repo_url: https://github.com/littlesulley/ComposableCameraSystem-Docs
repo_name: littlesulley/ComposableCameraSystem-Docs
edit_uri: edit/main/docs/

theme:
  name: shadcn
  custom_dir: overrides
  show_stargazers: true
  show_title: true
  pygments_style:
    light: shadcn-light
    dark: github-dark
  katex_options: {}

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - codehilite:
      guess_lang: false
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - mermaid2:
      version: 10.9.1

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Enabling the Plugin: getting-started/enabling-plugin.md
      - Your First Camera: getting-started/your-first-camera.md
  - User Guide:
      - user-guide/index.md
      - Concepts:
          - user-guide/concepts/index.md
          - Architecture Overview: user-guide/concepts/overview.md
          - Context Stack: user-guide/concepts/context-stack.md
          - Evaluation Tree: user-guide/concepts/evaluation-tree.md
          - Transitions: user-guide/concepts/transitions.md
          - Modifiers: user-guide/concepts/modifiers.md
      - The Graph Editor: user-guide/graph-editor.md
      - Authoring Camera Types: user-guide/authoring-camera-types.md
      - Blueprint API: user-guide/blueprint-api.md
      - Transitions & Blending: user-guide/transitions-and-blending.md
      - Impulse System: user-guide/impulse-system.md
  - Tutorials:
      - tutorials/index.md
      - Follow Camera: tutorials/follow-camera.md
      - Cutscene Context: tutorials/cutscene-context.md
      - Custom Transition: tutorials/custom-transition.md
  - Extending:
