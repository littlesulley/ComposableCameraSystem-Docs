site_name: ComposableCameraSystem
site_url: https://sulley.cc/ComposableCameraSystem-Docs/
site_description: A composable, data-driven camera framework for Unreal Engine 5.6
site_author: Sulley (littlesulley)
repo_url: https://github.com/littlesulley/ComposableCameraSystem
repo_name: littlesulley/ComposableCameraSystem
edit_uri: ""

validation:
  links:
    anchors: ignore          # attr_list { #id } anchors are invisible to the validator

theme:
  name: shadcn
  custom_dir: overrides
  show_stargazers: true
  show_title: true
  pygments_style:
    light: shadcn-light
    dark: github-dark
  katex_options: {}

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/diagram-lightbox.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.highlight:
      css_class: codehilite
      guess_lang: false
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

hooks:
  - hooks/obsidian_images.py

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: "100%"
      height: auto
      zoomable: true
      draggable: true
  - mermaid2:
      version: 10.9.1

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Enabling the Plugin: getting-started/enabling-plugin.md
      - Your First Camera: getting-started/your-first-camera.md
  - User Guide:
      - user-guide/index.md
      - Concepts:
          - user-guide/concepts/index.md
          - Architecture Overview: user-guide/concepts/overview.md
          - Context Stack: user-guide/concepts/context-stack.md
          - Evaluation Tree: user-guide/concepts/evaluation-tree.md
          - Transitions: user-guide/concepts/transitions.md
          - Modifiers: user-guide/concepts/modifiers.md
          - Actions: user-guide/concepts/actions.md
          - Camera Patches: user-guide/concepts/patches.md
      - The Graph Editor: user-guide/graph-editor.md
      - Authoring Camera Types: user-guide/authoring-camera-types.md
      - Blueprint API: user-guide/blueprint-api.md
      - Transitions & Blending: user-guide/transitions-and-blending.md
